<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  
  <!-- Фон -->
  <rect width="100" height="100" fill="#0B0C0E" rx="12"/>
  
  <!-- Жёлтая рамка -->
  <rect x="3" y="3" width="94" height="94" fill="none" stroke="#F2C94C" stroke-width="2" rx="10"/>
  
  <!-- Рельсы -->
  <line x1="15" y1="75" x2="85" y2="75" stroke="#F2C94C" stroke-width="2.5"/>
  <line x1="15" y1="82" x2="85" y2="82" stroke="#F2C94C" stroke-width="2.5"/>
  
  <!-- Шпалы -->
  <g stroke="#A0A0A0" stroke-width="2.5">
    <line x1="25" y1="70" x2="25" y2="87"/>
    <line x1="40" y1="70" x2="40" y2="87"/>
    <line x1="55" y1="70" x2="55" y2="87"/>
    <line x1="70" y1="70" x2="70" y2="87"/>
  </g>
  
  <!-- Ангар депо -->
  <rect x="30" y="28" width="45" height="44" fill="#1E2124" stroke="#F2C94C" stroke-width="2.5" rx="3"/>
  
  <!-- Крыша ангара -->
  <polygon points="26,28 50,10 74,28" fill="#16181B" stroke="#F2C94C" stroke-width="2.5" stroke-linejoin="round"/>
  
  <!-- Ворота (три секции) -->
  <rect x="35" y="42" width="10" height="30" fill="#0B0C0E" stroke="#2D9CDB" stroke-width="2"/>
  <rect x="47" y="42" width="10" height="30" fill="#0B0C0E" stroke="#2D9CDB" stroke-width="2"/>
  <rect x="59" y="42" width="10" height="30" fill="#0B0C0E" stroke="#2D9CDB" stroke-width="2"/>
  
  <!-- Жёлтая полоса над воротами -->
  <rect x="30" y="38" width="45" height="3" fill="#F2C94C"/>
  
</svg>

